<!DOCTYPE html>
<html lang="en">
<head>
    <title>NILM Leaderboard</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="https://fonts.googleapis.com/css?family=Ubuntu+Mono" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* Chart section */
        #chart-section { background:#fafafa; padding: 40px 0 50px; border-top: 1px solid #e0e0e0; }
        #chart-section h3 { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
        #chart-section .subtitle { color: #666; font-size: 0.85rem; margin-bottom: 24px; }
        .chart-wrapper { position: relative; background:#fff; border-radius:8px; box-shadow: 0 1px 6px rgba(0,0,0,.08); padding: 20px 20px 16px; }
        .appliance-toggles { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
        .toggle-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 12px; border-radius: 20px; border: 2px solid;
            background: transparent; cursor: pointer; font-size: 0.78rem;
            font-family: 'Ubuntu Mono', monospace; font-weight: 600;
            transition: background .15s, color .15s;
        }
        .toggle-btn.active { color: #fff !important; }
        .toggle-btn .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
        .stat-pills { display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; }
        .stat-pill {
            background: #f4f6fb; border-radius: 6px; padding: 5px 12px;
            font-size: 0.74rem; color: #444;
        }
        .stat-pill strong { display:block; font-size: 0.88rem; }
        canvas { max-height: 380px; }
    </style>
</head>

<body data-spy="scroll" data-target="#main-nav" data-offset="0">
    <nav class="navbar navbar-expand-md bg-dark navbar-dark sticky-top" id="main-nav">
        <a class="navbar-brand" href="/">NILM Leaderboard</a>
        <button class="navbar-toggler" data-toggle="collapse" data-target="#navbarCollapse">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse navbar-right" id="navbarCollapse">
            <ul class="nav navbar-nav ml-auto">
                <li class="nav-item"><a class="nav-link" href="#overview">Overview</a></li>
                <li class="nav-item"><a class="nav-link" href="#building-1">Building 1</a></li>
                <li class="nav-item"><a class="nav-link" href="#building-2">Building 2</a></li>
                <li class="nav-item"><a class="nav-link" href="#building-3">Building 3</a></li>
                <li class="nav-item"><a class="nav-link" href="#building-4">Building 4</a></li>
                <li class="nav-item"><a class="nav-link" href="#building-5">Building 5</a></li>
                <li class="nav-item"><a class="nav-link" href="#building-6">Building 6</a></li>
            </ul>
        </div>
    </nav>

    <section id="overview">
        <div class="container">
            <div class="row text-center">
                <div class="col-12">
                    <div class="display-4 mt-5 mb-5">REDD Dataset</div>
                </div>
            </div>
            <div class="row">
                <div class="col col-12">
                    <table class="table table-hover">
                        <thead class="thead-dark">
                            <tr>
                                <th scope="col">Problem</th>
                                <th scope="col">Fridge</th>
                                <th scope="col">Microwave</th>
                                <th scope="col">Threshold</th>
                                <th scope="col">Download</th>
                                <th scope="col">Submit</th>
                                <th scope="col">Status</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <!-- ── Appliance Readings Chart ── -->
    <section id="chart-section">
        <!-- <div class="container">
            <h3>Building 1 — Appliance Power Readings</h3>
            <p class="subtitle">Downsampled from 348,731 readings &bull; Power in Watts &bull; Toggle appliances below</p>
            <div class="appliance-toggles" id="appliance-toggles"></div>
            <div class="chart-wrapper">
                <canvas id="applianceChart"></canvas>
            </div>
            <div class="stat-pills" id="stat-pills"></div>
        </div> -->
    </section>

    <!-- Upload Modal -->
    <div class="modal fade" id="uploadModal" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Upload CSV — <span id="modal-building-name"></span></h5>
                    <button type="button" class="close" data-dismiss="modal"><span>&times;</span></button>
                </div>
                <div class="modal-body">
                    <div class="drop-zone" id="drop-zone">
                        <input type="file" id="csv-file-input" accept=".csv" />
                        <div class="drop-zone-icon"><i class="fas fa-file-csv"></i></div>
                        <div class="drop-zone-label">Drag &amp; drop your CSV here, or <span>browse</span></div>
                    </div>
                    <div id="file-pill-wrap" style="display:none;">
                        <div class="file-pill">
                            <i class="fas fa-check-circle" style="color:#27ae60;"></i>
                            <span id="file-name-display"></span>
                            <span class="remove-file" id="remove-file-btn">&times;</span>
                        </div>
                    </div>
                    <div class="upload-progress" id="upload-progress">
                        <div class="progress">
                            <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width:0%" id="progress-bar-fill">0%</div>
                        </div>
                    </div>
                    <div id="upload-feedback" class="mt-2" style="font-size:.85rem;"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="confirm-upload-btn" disabled>
                        <i class="fas fa-upload mr-1"></i> Upload
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer id="main-footer" class="footer text-center">
        <div class="container">
            <div class="row"><div class="col-md"><span>Copyright &copy; Newcastle University</span></div></div>
        </div>
    </footer>

    <script src="/js/script.js"></script>
    <script src="/js/upload.js"></script>
</body>
</html>
